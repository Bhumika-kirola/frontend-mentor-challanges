<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Profile card component</title>
</head>

<body>
  <div class="card">
    <header>
      <div class="bg"><img src="images/bg-pattern-card.svg" alt="Background Pattern"></div>
      <div class="profile-img"><img src="images/image-victor.jpg" alt="Profile Image"></div>
      <div class="personal-info">
        <div class="info">
          <div class="name">Victor Crest</div>
          <div class="age">26</div>
        </div>
        <span class="city">London</span>
      </div>
    </header>
    <main>
      <div class="follow box">
        <div class="num">80K</div>
        <span>Followers</span>
      </div>
      <div class="like box">
        <div class="num">1.4K</div>
        <span>Likes</span>
      </div>
      <div class="pics box">
        <div class="num">1.4K</div>
        <span>Photos</span>
      </div>
    </main>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Bhumika Kirola</a>.
  </footer>
</body>

</html>
