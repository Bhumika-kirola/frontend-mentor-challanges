<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | NFT preview card component</title>
</head>

<body>
  <div class="card">
    <header>
      <h1>Equilibrium #3429</h1>
    </header>
    <main>
      <div class="into">
        <p> Our Equilibrium collection promotes balance and calm.
        </p>
      </div>
      <div class="genes">
        <div class="eth-box">
          <div class="eth-img-box"><img src="images/icon-ethereum.svg" alt="Ethereum icon"></div>
          <span class="eth">0.041 ETH</span>
        </div>
        <div class="time-box">
          <div class="time-img-box"><img src="images/icon-clock.svg" alt="Clock icon"></div>
          <span class="time">3 days left</span>
        </div>
      </div>
    </main>
    <div class="footer">
      <div class="image"><img src="images/image-avatar.png" alt="img"></div>
      <p>Creation of Jules Wyvern</p>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Bhumika kirola</a>.
  </footer>
</body>

</html>
