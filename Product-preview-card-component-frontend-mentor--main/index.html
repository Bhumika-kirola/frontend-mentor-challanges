<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">
    <div class="img-container">
      <img src="images/image-product-desktop.jpg" alt="picture" class="img">
    </div>
    <div class="text">
      <header>
        <div class="heading1">
          <span>PERFUME</span>
        </div>
        <div class="heading2">
          <h1>Gabrielle Essence Eau De Parfum</h1>
        </div>
      </header>
      <main>
        <div class="info">
          <p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator for the House of CHANEL.</p>
        </div>
        <div class="price">
          <span class="current">$149.99</span>
          <span class="old">$169.99</span>
        </div>
        <div class="add-to-cart-btn">
          <button>
            <div class="cart">
              <img src="images/icon-cart.svg" alt="shop">
            </div>
            <span>Add to Cart</span>
          </button>
        </div>
      </main>
    </div>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Bhumika kirola</a>.
  </footer>
</body>

</html>
