<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">
    <div class="anima">
      <h1>Your Result</h1>
      <div class="res-circle">
        <span class="num">76</span>
        <span class="total">of 100</span>
      </div>

      <span class="remark">Great</span>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="summary">

      <div class="head">Summary</div>
      <div class="reaction box">
        <span class="icon"><img src="assets/images/icon-reaction.svg" alt="icon"></span>
        <div class="heading react">Reaction</div>
        <div class="mark"><b>80</b> / 100</div>
      </div>
      <div class="memory box">
        <span class="icon"><img src="assets/images/icon-memory.svg" alt="icon"></span>
        <div class="heading mem">Memory</div>
        <div class="mark"><b>92</b> / 100</div>


      </div>
      <div class="verbal box">
        <span class="icon"><img src="assets/images/icon-verbal.svg" alt="icon"></span>
        <div class="heading veb">Verbal</div>
        <div class="mark"><b>61</b> / 100</div>


      </div>
      <div class="visual box">
        <span class="icon"><img src="assets/images/icon-visual.svg" alt="icon"></span>
        <div class="heading visual">Visual</div>
        <div class="mark"><b>72</b> / 100</div>


      </div>

      <div><button>Continue</button></div>
    </div>

  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Bhumika Kirola</a>.
  </footer>
</body>

</html>
